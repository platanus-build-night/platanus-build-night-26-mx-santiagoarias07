# Render Blueprint — deploy the full Next.js app (UI + live agent API).
# Render runs a persistent Node server with no request timeout, so the live
# adversarial run streams comfortably here. (Vercel works too — see README.)
services:
  - type: web
    name: invariant
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false # set this in the Render dashboard (secret)
      - key: AGENT_MODEL
        value: claude-sonnet-4-6
      - key: NODE_VERSION
        value: "20.18.0"
